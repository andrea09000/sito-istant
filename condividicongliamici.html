            border-radius: 40px;

        .link .text-content {

    <script>
        // Funzione per rilevare il dispositivo
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Rileva iOS
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return 'ios';
            }
            
            // Rileva Android
            if (/android/i.test(userAgent)) {
                return 'android';
            }
            
            return 'other';
        }

        // Redirect automatico al caricamento della pagina
        (function() {
            const device = detectDevice();
            const appleStoreUrl = 'https://apps.apple.com/us/app/spottly/id6756431227';
            const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.spottlyapp.mobile&hl=it';
            
            if (device === 'ios') {
                window.location.href = appleStoreUrl;
            } else if (device === 'android') {
                window.location.href = playStoreUrl;
            }
            // Se non è né iOS né Android, mostra la pagina normalmente
        })();
