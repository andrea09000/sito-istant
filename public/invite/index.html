<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Istant — Invito</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b0b0c;
        color: #fff;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.04);
        border-radius: 18px;
        padding: 20px;
      }
      h1 { margin: 0 0 10px; font-size: 20px; }
      p { margin: 0 0 14px; color: rgba(255,255,255,0.75); font-weight: 600; line-height: 1.4; }
      code {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.9);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Apri l’invito nell’app</h1>
        <p>
          Se hai già installato <strong>Istant</strong>, torna indietro e riapri il link.
        </p>
        <p>
          Questo è un fallback web: l’apertura diretta dell’app dipende da Universal Links / App Links.
        </p>
        <p style="margin-bottom:0">Path: <code>/invite/&lt;token&gt;</code></p>
      </div>
    </div>
  </body>
</html>
